# Manual-only (workflow_dispatch). Runs bot/bot.js against the entire
# Discord server history and rewrites bot/decks.json from scratch.

name: Full Sync True Hub Decks

on:
  workflow_dispatch:   # manual run button only - this one's expensive, run deliberately

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        working-directory: bot
        run: npm install

      - name: Run Discord scraper
        working-directory: bot
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
        run: node bot.js

      - name: Commit updated decks.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add bot/decks.json
          git commit -m "Update decks.json [full sync]" || echo "No changes to commit"
          git push
