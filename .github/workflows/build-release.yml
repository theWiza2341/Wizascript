# Builds manifest.js (and everything it imports from packages/*) via
# build.js, then commits the result to wizascript.user.js at the repo
# root. Triggers on push to main, excluding pushes that only touch
# wizascript.user.js itself (to avoid re-triggering on its own commit).

name: Build Wizascript

on:
  push:
    branches: [main]
    paths-ignore:
      - 'wizascript.user.js'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Build wizascript.user.js
        run: node build.js

      - name: Commit built userscript
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add wizascript.user.js
          git commit -m "Build wizascript.user.js [auto]" || echo "No changes to commit"
          git push
